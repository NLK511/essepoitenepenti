<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Trade Proposer App{% endblock %}</title>
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("trade-proposer-theme");
        var theme = savedTheme || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_error) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css" />
  <script defer src="/static/theme.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a href="/" class="brand-mark">TP</a>
        <div>
          <div class="brand-title">Trade Proposer App</div>
          <div class="brand-subtitle">Recommendation operations, diagnostics, and review</div>
        </div>
      </div>
      <div class="topbar-actions">
        <nav class="main-nav" aria-label="Primary navigation">
          <a href="/" class="nav-link">Dashboard</a>
          <a href="/watchlists" class="nav-link">Watchlists</a>
          <a href="/jobs" class="nav-link">Jobs</a>
          <a href="/history" class="nav-link">History</a>
          <a href="/debugger" class="nav-link">Debugger</a>
          <a href="/settings" class="nav-link">Settings</a>
          <a href="/api/health" class="nav-link">Health</a>
        </nav>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle light and dark theme">
          <span class="theme-toggle-icon" aria-hidden="true">◐</span>
          <span id="theme-toggle-label">Theme</span>
        </button>
      </div>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
