version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn trade_proposer_app.app:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/trade_proposer
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && python -m trade_proposer_app.workers.tasks"
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/trade_proposer
    depends_on:
      - postgres

  scheduler:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && python -m trade_proposer_app.scheduler"
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/trade_proposer
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: trade_proposer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
