version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn trade_proposer_app.app:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && python -m trade_proposer_app.workers.tasks"
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  scheduler:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e . && python -m trade_proposer_app.services.runs"
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: trade_proposer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    ports:
      - "6379:6379"
